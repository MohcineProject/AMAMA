# Example orchestrator configuration.
# Copy to orchestrator.yaml and adjust paths.

case:
  max_rounds: 5
  max_queries_per_round: 30
  output_dir: "./output"

# In-process modules: each must inherit BaseForensicModule.
# ``path`` is the module root added to sys.path before import (relative to this config file, or use absolute path).
#
# Example (dev stub — no path needed, lives inside backbone package):
# modules:
#   - class: backbone.dev.stub_module.StubModule
#
# Example (disk module):
# modules:
#   - class: disk_module.DiskModule
#     path: ../../Modules/Disk/disk-agentic-architecture
#     kwargs:
#       use_llm: true
#       artifact_dir: ../../Modules/Disk/Disk_Artifacts
#
modules: []

threat_intel:
  enabled: true
  # batch_size: 50

report:
  # use_llm: false
